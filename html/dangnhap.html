<!DOCTYPE html>
<html lang="vi">
	<head>
		<title>Đăng nhập</title>
		<meta charset="utf-8">
		<link rel="stylesheet" href="../css/dangnhap.css">
	</head>
	<body>
		<div class="container">
			<form id="frmLogin">
				<h2>Đăng nhập</h2>
				<div class="form-group">
					<label for="txtUsername">Tài khoản</label>
					<input type="text" id="txtUsername" name="txtUsername">
				</div>
				<div class="form-group">
					<label for="txtPassword">Mật khẩu</label>
					<input type="password" id="txtPassword" name="txtPassword">
				</div>

				<div class="form-control">
					<input type="submit" value="Login" name="sbLogin" id="control">
					<input type="reset" value="Reset" name="sbReset" id="control">
					<input type="button" value="Đăng ký" name="sbRegister" id="control" onclick="window.location.href='dangky.html'" target="_blank">
				</div>
			</form>
		</div>
	</body>
</html>
